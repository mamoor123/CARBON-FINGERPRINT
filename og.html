<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
.card {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #0a0f1a 0%, #111827 100%);
  display: flex; flex-direction: column; justify-content: center;
  padding: 60px 80px; position: relative; overflow: hidden;
}
.glow {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(16,185,129,0.15), transparent 70%);
  top: -100px; right: -100px;
}
.glow2 {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%);
  bottom: -80px; left: -80px;
}
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; position: relative; z-index: 1; }
.logo-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #000;
}
.logo-text { font-size: 24px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.2); border-radius: 100px;
  font-size: 13px; color: #34d399; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 20px; position: relative; z-index: 1;
}
.score-section { position: relative; z-index: 1; margin-bottom: 24px; }
.score { font-size: 100px; font-weight: 700; color: #f1f5f9; line-height: 1; letter-spacing: -3px; }
.unit { font-size: 24px; color: #94a3b8; font-weight: 400; margin-left: 8px; }
.label { font-size: 20px; color: #10b981; font-weight: 600; margin-top: 8px; text-transform: uppercase; letter-spacing: 2px; }
.bars { display: flex; gap: 16px; position: relative; z-index: 1; margin-bottom: 28px; }
.bar-item { flex: 1; }
.bar-label { font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
.bar-track { height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }
.footer { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; }
.url { font-size: 18px; color: #64748b; font-weight: 500; }
.cta {
  padding: 12px 28px; background: linear-gradient(135deg, #10b981, #2dd4bf);
  border-radius: 10px; font-size: 16px; font-weight: 600; color: #000;
}
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="header">
    <div class="logo-icon">🌍</div>
    <div class="logo-text">Carbon Fingerprint</div>
  </div>
  <div class="badge">⚡ Powered by 144 Years of NASA Data</div>
  <div class="score-section">
    <div class="score"><span id="score">8.1</span><span class="unit">tonnes CO₂/year</span></div>
    <div class="label" id="label">⚠️ Above Average</div>
  </div>
  <div class="bars" id="bars">
    <div class="bar-item"><div class="bar-label">🚗 Transport: <span id="b1">0.8t</span></div><div class="bar-track"><div class="bar-fill" id="bf1" style="width:16%;background:linear-gradient(90deg,#3b82f6,#22d3ee)"></div></div></div>
    <div class="bar-item"><div class="bar-label">🍽️ Diet: <span id="b2">2.5t</span></div><div class="bar-track"><div class="bar-fill" id="bf2" style="width:62%;background:linear-gradient(90deg,#10b981,#34d399)"></div></div></div>
    <div class="bar-item"><div class="bar-label">⚡ Energy: <span id="b3">1.5t</span></div><div class="bar-track"><div class="bar-fill" id="bf3" style="width:37%;background:linear-gradient(90deg,#eab308,#f97316)"></div></div></div>
    <div class="bar-item"><div class="bar-label">🛍️ Consumption: <span id="b4">1.0t</span></div><div class="bar-track"><div class="bar-fill" id="bf4" style="width:25%;background:linear-gradient(90deg,#ec4899,#8b5cf6)"></div></div></div>
  </div>
  <div class="footer">
    <div class="url">carbonprint.earth</div>
    <div class="cta">🌱 Discover Your Fingerprint</div>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const score = parseFloat(params.get('s')) || 8.1;
const t = parseFloat(params.get('t')) || 0.8;
const d = parseFloat(params.get('d')) || 2.5;
const e = parseFloat(params.get('e')) || 1.5;
const c = parseFloat(params.get('c')) || 1.0;

document.getElementById('score').textContent = score.toFixed(1);
document.getElementById('b1').textContent = t.toFixed(1) + 't';
document.getElementById('b2').textContent = d.toFixed(1) + 't';
document.getElementById('b3').textContent = e.toFixed(1) + 't';
document.getElementById('b4').textContent = c.toFixed(1) + 't';

document.getElementById('bf1').style.width = Math.min(t / 5 * 100, 100) + '%';
document.getElementById('bf2').style.width = Math.min(d / 4 * 100, 100) + '%';
document.getElementById('bf3').style.width = Math.min(e / 4 * 100, 100) + '%';
document.getElementById('bf4').style.width = Math.min(c / 3 * 100, 100) + '%';

let label = '⚠️ Above Average';
let color = '#f97316';
if (score <= 2.5) { label = '🌟 Climate Champion'; color = '#10b981'; }
else if (score <= 4.5) { label = '🌿 Eco Conscious'; color = '#34d399'; }
else if (score <= 7) { label = '🌱 Growing Awareness'; color = '#eab308'; }
else if (score <= 12) { label = '⚠️ Above Average'; color = '#f97316'; }
else { label = '🔴 Heavy Footprint'; color = '#ef4444'; }
document.getElementById('label').textContent = label;
document.getElementById('label').style.color = color;
</script>
</body>
</html>
